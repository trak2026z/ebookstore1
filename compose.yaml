name: ebookstore

services:
  workspace:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    command: ["sleep", "infinity"]
    init: true
    tty: true
    stdin_open: true
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://ebookstore:ebookstore_dev@postgres:5432/ebookstore
      JWT_SECRET: development-only-secret-change-before-production
      JWT_ACCESS_TOKEN_TTL_SECONDS: "900"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    command: ["npm", "run", "start:dev", "--workspace", "@ebookstore/api"]
    init: true
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://ebookstore:ebookstore_dev@postgres:5432/ebookstore
      JWT_SECRET: development-only-secret-change-before-production
      JWT_ACCESS_TOKEN_TTL_SECONDS: "900"
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/api/v1/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ebookstore
      POSTGRES_USER: ebookstore
      POSTGRES_PASSWORD: ebookstore_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebookstore -d ebookstore"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  node_modules:
  postgres_data:
